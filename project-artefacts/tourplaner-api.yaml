openapi: 3.0.3
info:
  title: Tourplaner API
  version: 0.1.0
  description: Embrionic form of the Tourplaner API.
servers:
  - url: http://localhost:8080/api/
tags:
  - name: Auth
  - name: Tours
  - name: Logs
  - name: Routes
  - name: Search

security: 
  - bearerAuth: []

paths:
  /login:
    post:
      tags:
        - Auth
      summary: User login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredentials'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Login unsuccessful
  /register:
    post:
      tags:
        - Auth
      summary: User registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredentials'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Email/Username already in use
  /tours:
    get:
      tags:
        - Tours
      summary: Get user's tours
      responses:
        '200':
          description: Retrieved user's tours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tour'
    post:
      tags:
        - Tours
      summary: Create a new tour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TourInput'
      responses:
        '201':
          description: Tour created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
  /tours/{tourID}:
    get:
      tags:
        - Tours
      summary: Get a specific tour
      parameters:
        - in: path
          name: tourID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tour details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '404':
          description: Tour not found
    put:
      tags:
        - Tours
      summary: Update a tour
      parameters:
        - in: path
          name: tourID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TourInput'
      responses:
        '200':
          description: Tour updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tour'
        '403':
          description: Unauthorized Access
    delete:
      tags:
        - Tours
      summary: Delete a tour
      parameters:
        - in: path
          name: tourID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Tour deleted (no content)
  /tours/{tourID}/export:
    get:
      tags:
        - Tours
      summary: Exportiert eine Tour als Datei
      parameters:
        - in: path
          name: tourID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Datei-Download
          content:
            application/json: #CSV?
              schema:
                type: string #fromat: csv/xml? 
  /tours/{tourID}/log:
    post:
      tags:
        - Tours
      summary: Add a log entry to a tour
      parameters:
        - in: path
          name: tourID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogInput'
      responses:
        '201':
          description: Log entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
  /logs/{logID}:
    get:
      tags:
        - Logs
      summary: Get a log entry by ID
      parameters:
        - in: path
          name: logID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Log entry details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
    put:
      tags:
        - Logs
      summary: Update a log entry
      parameters:
        - in: path
          name: logID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogInput'
      responses:
        '200':
          description: Log entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
    delete:
      tags:
        - Logs
      summary: Delete a log entry
      parameters:
        - in: path
          name: logID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Log entry deleted (no content)
  /routes:
    post:
      tags:
        - Routes
      summary: Get route information
      requestBody: 
        required: true
        content:
          application/json: 
            schema:
              $ref: '#/components/schemas/RouteInput'
      responses:
        '200':
          description: Route data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
  /tours/{tourID}/route:
    put:
      tags:
        - Tours
      summary: Update route-info
      parameters:
        - in: path
          name: tourID
          required: true
          schema:
            type: string
            format: uuid
      requestBody: 
        required: true
        content:
          application/json: 
            schema:
              $ref: '#/components/schemas/RouteInput'
      responses:
        '200':
          description: Route data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
  /search:
    get:
      tags:
        - Search
      summary: Entry point for search requests
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search query
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResults'
components:
  securitySchemes: 
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserCredentials:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    TokenResponse:
      type: object
      properties:
        token:
          type: string
        expiry:
          type: string
          format: date-time
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
    Tour:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        transportType:
          $ref: '#/components/schemas/TransportType'
        distance:
          type: number
          description: "berechntet Distanz in km (von ORS)"
        estimatedTime:
          type: string
          description: "Dauer einheitlich formatiert (Bsp: 1h23)"
        popularity:
          type: number
          description: "Berechneter Popularitäts-Index? (F04/F09)"
        childFriendliness:
          type: number
          description: "Berechneter Difficultiy-Index? (F04/F09)"
        logs:
          type: array
          items:
            $ref: '#/components/schemas/Log'
    TourInput:
      type: object
      required:
        - name
        - from
        - to
        - transportType
      properties:
        name:
          type: string
        description:
          type: string
        from:
          type: string
          description: "Startadresse für das Geocoding (z.B. 'Stephansplatz, Wien')"
        to:
          type: string
          description: "Zieladresse"
        transportType:
          $ref: '#/components/schemas/TransportType'
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dateTime:
          type: string
          format: date-time
        comment:
          type: string
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
        totalDistance:
          type: number
        totalTime:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
    LogInput:
      type: object
      required:
        - dateTime
        - difficulty
        - rating
      properties:
        dateTime:
          type: string
          format: date-time
        comment:
          type: string
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
        rating:
          type: integer
          minimum: 1
          maximum: 5
        totalDistance:
          type: number
        totalTime:
          type: string
          description: "Dauer im ISO-8601 Format"
    Route:
      type: object
      properties:
        id:
          type: string
          format: uuid
        geometry:
          type: string
          description: "GeoJSON oder Encoded Polyline von ORS"
        startLocation:
          $ref: '#/components/schemas/Location'
        endLocation:
          $ref: '#/components/schemas/Location'
    RouteInput: 
      type: object
      required: [from, to, transportType]
      properties:
        from:
          $ref: '#/components/schemas/Location'
        to: 
          $ref: '#/components/schemas/Location'
        transportType:
          $ref: '#/components/schemas/TransportType'
    Location:
      type: object
      properties:
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
    SearchResults:
      type: object
      properties:
        tours:
          type: array
          items:
            $ref: '#/components/schemas/Tour'
        logs:
          type: array
          items:
            $ref: '#/components/schemas/Log'
        routes:
          type: array
          items:
            $ref: '#/components/schemas/Route'
    TransportType:
      type: string
      enum: [BIKE, HIKE, RUN, VACATION, PUBLIX]
